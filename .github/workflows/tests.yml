name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for setuptools-scm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (required by lalsuite/pycbc)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q software-properties-common
          sudo add-apt-repository -y ppa:ligo-software/ligo-stable
          sudo apt-get update -q
          sudo apt-get install -y -q \
            libhdf5-dev \
            libfftw3-dev \
            libgsl-dev \
            libframel-dev \
            libmetaio-dev \
            pkg-config

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests (slow tests excluded)
        run: pytest
